<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake</title>
<style>
/* Temel sayfa ayarları */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #000;
    overflow: hidden;
    font-family: "Brush Script MT", cursive;
}

/* Pasta kapsayıcı */
#birthday-cake {
    position: relative;
    width: 40vw;
    max-width: 400px;
    aspect-ratio: 1/1;
}

/* Pasta katları */
.cake, .middle, .top, .chocs .choc {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

/* Ana pasta gövdesi */
.cake {
    width: 100%;
    height: 35%;
    bottom: 0;
    background-color: #371d03;
    border-radius: 2% 2% 10% 10%;
}

/* Orta pasta katmanı */
.middle {
    width: 90%;
    height: 25%;
    bottom: 35%;
    background-color: #4d280a;
    border-radius: 2% 2% 10% 10%;
    z-index: 1;
}

/* Üst pasta katmanı */
.top {
    width: 90%;
    height: 20%;
    bottom: 60%;
    background-color: #291506;
    border-radius: 50%;
    z-index: 2;
    box-shadow: inset 5% -2% rgba(255,255,255,0.1);
}

/* Çikolatalar */
.chocs {
    width: 100%;
    height: 25%;
    bottom: 60%;
    display: flex;
    justify-content: space-between;
    z-index: 1;
}

.choc {
    width: 10%;
    height: 100%;
    background-color: #291506;
    border-radius: 50% 50% 50% 50% / 0% 0% 100% 100%;
}

/* Mumlar */
.candles {
    position: absolute;
    bottom: 85%;
    width: 100%;
    display: flex;
    justify-content: space-around;
    z-index: 3;
}

.candle {
    width: 5%;
    aspect-ratio: 1 / 4;
    background: linear-gradient(90deg, #4e0351, #7b0581 35%, #b23bb8 50%, #7b0581 70%, #3a023c);
    border-radius: 10% 10% 0 0;
    position: relative;
}

.candle::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 15%;
    background: #7f5539;
    bottom: -10%;
    left: -10%;
    border-radius: 50%;
}

/* Mum alevleri */
.flame {
    position: absolute;
    width: 150%;
    aspect-ratio: 1 / 1.5;
    background-color: rgba(252,191,73,.8);
    top: -150%;
    left: -25%;
    border-radius: 50%;
    animation: flame 1.1s infinite;
}

/* Yazılar */
.text {
    position: absolute;
    top: 5%;
    width: 100%;
    text-align: center;
    font-size: clamp(30px, 6vw, 90px);
    color: white;
    z-index: 4;
    opacity: 0;
}

.text2 {
    position: absolute;
    bottom: 5%;
    width: 100%;
    text-align: center;
    font-size: clamp(15px, 2vw, 25px);
    color: white;
    z-index: 4;
}

/* Animasyonlar */
@keyframes flame {
    0%,25%,100%{transform: scaleY(1);}
    50%,75%{transform: scaleY(1.2);}
}
@keyframes centerShow{
    0%{opacity:0; transform: translateY(-20%);}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0; transform: translateY(-20%);}
}
</style>
</head>
<body>
<audio id="birthday-music" src="bday.mp3" loop></audio>

<div id="birthday-cake">
    <div class="cake"></div>
    <div class="middle"></div>
    <div class="top"></div>
    
    <div class="chocs">
        <div class="choc"></div>
        <div class="choc"></div>
        <div class="choc"></div>
        <div class="choc"></div>
        <div class="choc"></div>
        <div class="choc"></div>
        <div class="choc"></div>
    </div>

    <div class="candles">
        <div class="candle"></div>
        <div class="candle"></div>
        <div class="candle"></div>

        <div class="flame"></div>
        <div class="flame"></div>
        <div class="flame"></div>
    </div>
</div>

<div class="text">Happy Birthday!!!</div>
<div class="text2">Blow the candles love</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){
    const audio = document.getElementById("birthday-music");
    audio.volume = 0.5; 

    function blowOutCandles() {
        $(".flame").fadeOut("fast");
        $(".text").css({ opacity:1, animation:"centerShow 3s forwards" });

        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(err => {
                alert("Üfleme algılandı! Müzik çalması için ekrana tıklayın.");
                $(document).one("click", function() {
                    audio.play();
                });
            });
        }
    }

    // Mikrofon blow detection
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const mediaStreamSource = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        mediaStreamSource.connect(analyser);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function detectBlow() {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++){
                sum += dataArray[i];
            }
            const average = sum / dataArray.length;

            if(average > 70){  
                blowOutCandles();
                return; 
            }
            requestAnimationFrame(detectBlow);
        }
        detectBlow();
    })
    .catch(err => console.error("Mikrofon erişimi reddedildi:", err));
});
</script>
</body>
</html>
